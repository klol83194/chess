<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: FULL ID EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .p-info { display: flex; align-items: center; gap: 8px; text-align: left; }
        .ava-box { width: 45px; height: 45px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        #board-frame { width: 92vw; height: 92vw; max-width: 380px; max-height: 380px; margin: 15px auto; border: 3px solid #333; position: relative; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.2s; }
        
        .t-def .w { background: #eeeed2; } .t-def .b { background: #769656; }
        .t-purple .w { background: #2d004d; } .t-purple .b { background: #1a0029; }
        .t-blood .w { background: #4a0000; } .t-blood .b { background: #1a0000; }
        
        .selected { outline: 3px solid var(--gold) inset; background: rgba(255,215,0,0.4) !important; }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: #151515; border: 2px solid var(--gold); padding: 20px; z-index: 200; border-radius: 12px; max-height: 85vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        
        .tab-btn { flex: 1; padding: 10px; background: #333; color: #fff; border: none; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: #000; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .grid-item { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #444; font-size: 20px; }
        .grid-item.active { border-color: var(--gold); background: #2a2a10; }
        .item-row { background: #222; margin: 8px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 6px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 5px;}
        
        #my-id-box { 
            background: #222; 
            padding: 8px; 
            border-radius: 5px; 
            font-family: monospace; 
            font-size: 11px; 
            word-break: break-all; 
            margin-top: 5px; 
            border: 1px dashed var(--gold);
            cursor: pointer;
        }
    </style>
</head>
<body class="t-def" id="app">

<div id="top-bar">
    <div class="p-info">
        <div class="ava-box" id="display-ava">👤</div>
        <div>
            <b id="display-coins" style="color:var(--gold)">0</b> 🪙<br>
            <small>🏆 <span id="display-elo">1200</span></small>
        </div>
    </div>
    <button class="btn" onclick="openModal()">МЕНЮ</button>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 10px;">
    <div>
        <small>БОТЫ:</small>
        <button class="btn" style="padding:5px 10px; background:#4caf50" onclick="startBot(1)">1</button>
        <button class="btn" style="padding:5px 10px; background:#ff9800" onclick="startBot(2)">2</button>
        <button class="btn" style="padding:5px 10px; background:#f44336" onclick="startBot(3)">3</button>
    </div>
    <hr style="border:0; border-top:1px solid #333; margin: 10px 0;">
    <input type="text" id="opp-id" placeholder="Вставь полный ID друга">
    <button class="btn" style="width:100%" onclick="connect()">ИГРАТЬ PVP</button>
    <div id="my-id-box" onclick="copyMyId()">Твой ID: <span id="my-id">ЗАГРУЗКА...</span> (нажми, чтобы скопировать)</div>
</div>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="t-inv" class="tab-btn active" onclick="setTab('inv')">СКЛАД</button>
        <button id="t-shop" class="tab-btn" onclick="setTab('shop')">МАГАЗИН</button>
    </div>
    <div id="sec-inv"><div class="grid" id="inv-avas"></div><div id="inv-items"></div></div>
    <div id="sec-shop" style="display:none"><div class="grid" id="shop-avas"></div><div id="shop-items"></div></div>
    <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
    <input type="text" id="promo-in" placeholder="ПРОМОКОД">
    <button class="btn" style="width:100%" onclick="usePromo()">АКТИВИРОВАТЬ</button>
</div>

<script>
    const AVATARS = { '👤':0, '🐱':100, '👺':300, '🥷':500, '🤡':1000 };
    const SHOP = {
        't-purple': { n: 'Неон', p: 500, type: 't' },
        't-blood': { n: 'Кровь', p: 800, type: 't' },
        's-giri': { n: 'Скин: Гири', p: 1000, type: 's' }
    };
    const PIECE_VALS = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let elo = parseInt(localStorage.getItem('g_elo')) || 1200;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['👤', 't-def', 's-def'];
    let curAva = localStorage.getItem('g_a') || '👤';
    let curTheme = localStorage.getItem('g_t') || 't-def';
    let curSkin = localStorage.getItem('g_s') || 's-def';

    const game = new Chess();
    let conn, myColor = 'w', lastSq = null, botLvl = 0;

    // Инициализация PeerJS с полным ID
    const peer = new Peer(undefined, { host: '0.peerjs.com', port: 443, secure: true });

    peer.on('open', id => { 
        document.getElementById('my-id').innerText = id; 
    });

    peer.on('connection', c => { 
        conn = c; myColor = 'w'; botLvl = 0; 
        alert("Противник подключился! Твой ход.");
        conn.on('open', setupComm);
    });

    function connect() {
        const id = document.getElementById('opp-id').value.trim();
        if(!id) return alert("Вставь ID!");
        conn = peer.connect(id);
        myColor = 'b'; botLvl = 0;
        conn.on('open', () => { alert("Подключено! Ожидай ход белых."); setupComm(); });
    }

    function setupComm() {
        conn.on('data', d => { if(d.m) { game.move(d.m); render(); checkEnd(); } });
    }

    function copyMyId() {
        const id = document.getElementById('my-id').innerText;
        navigator.clipboard.writeText(id);
        alert("ID скопирован!");
    }

    // БОТЫ
    function startBot(lvl) {
        botLvl = lvl; myColor = 'w'; game.reset(); render();
    }

    function botMove() {
        if(game.game_over()) return;
        const moves = game.moves();
        let move;
        if(botLvl === 1) move = moves[Math.floor(Math.random()*moves.length)];
        else if(botLvl === 2) move = moves.sort((a,b) => (b.includes('x')?1:-1) - (a.includes('x')?1:-1))[0];
        else {
            let bestS = -999, bestM = moves[0];
            moves.forEach(m => {
                game.move(m);
                let s = 0;
                game.board().forEach(r => r.forEach(p => { if(p) s += (p.color==='b'?PIECE_VALS[p.type]:-PIECE_VALS[p.type]); }));
                if(s > bestS) { bestS = s; bestM = m; }
                game.undo();
            });
            move = bestM;
        }
        game.move(move); render(); checkEnd();
    }

    function checkEnd() {
        if(game.game_over()) {
            let res = game.in_draw() ? 0.5 : (game.turn() !== myColor ? 1 : 0);
            let K = 30, exp = 1/(1+Math.pow(10, (1200-elo)/400));
            let diff = Math.round(K * (res - exp));
            elo += diff;
            if(res === 1) coins += (botLvl * 50) + 10;
            alert(`Конец! Рейтинг: ${elo} (${diff>0?'+':''}${diff})`);
            sync();
        }
    }

    function render() {
        const b = document.getElementById('board'); b.innerHTML = '';
        document.getElementById('app').className = curTheme;
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${lastSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    if(curSkin === 's-giri') pc.innerText = {p:'🪨',r:'📦',n:'🏋️',b:'🔔',q:'🏆',k:'💪'}[p.type];
                    else pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor || game.game_over()) return;
                    if(lastSq) {
                        const m = game.move({from: lastSq, to: sq, promotion: 'q'});
                        if(m) { 
                            if(conn) conn.send({m: m.san}); 
                            lastSq = null; render(); checkEnd();
                            if(botLvl > 0) setTimeout(botMove, 600);
                        } else { lastSq = sq; render(); }
                    } else { lastSq = sq; render(); }
                };
                b.appendChild(cell);
            });
        });
    }

    function sync() {
        document.getElementById('display-coins').innerText = coins;
        document.getElementById('display-ava').innerText = curAva;
        document.getElementById('display-elo').innerText = elo;
        const iA = document.getElementById('inv-avas'), sA = document.getElementById('shop-avas');
        iA.innerHTML = ''; sA.innerHTML = '';
        for(let a in AVATARS) {
            if(unlocked.includes(a)) iA.innerHTML += `<div class="grid-item ${curAva===a?'active':''}" onclick="setA('${a}')">${a}</div>`;
            else sA.innerHTML += `<div class="grid-item" onclick="buyA('${a}')">${a}<br><small>${AVATARS[a]}</small></div>`;
        }
        const iI = document.getElementById('inv-items'), sI = document.getElementById('shop-items');
        iI.innerHTML = ''; sI.innerHTML = '';
        for(let id in SHOP) {
            if(unlocked.includes(id)) iI.innerHTML += `<div class="item-row">${SHOP[id].n} <button class="btn" onclick="use('${id}')">ВЗЯТЬ</button></div>`;
            else sI.innerHTML += `<div class="item-row">${SHOP[id].n} <button class="btn" onclick="buy('${id}')">${SHOP[id].p}🪙</button></div>`;
        }
        localStorage.setItem('g_c', coins); localStorage.setItem('g_u', JSON.stringify(unlocked));
        localStorage.setItem('g_a', curAva); localStorage.setItem('g_t', curTheme); 
        localStorage.setItem('g_s', curSkin); localStorage.setItem('g_elo', elo);
        render();
    }

    function buyA(a) { if(coins >= AVATARS[a]) { coins -= AVATARS[a]; unlocked.push(a); sync(); } }
    function buy(id) { if(coins >= SHOP[id].p) { coins -= SHOP[id].p; unlocked.push(id); sync(); } }
    function setA(a) { curAva = a; sync(); }
    function use(id) { if(SHOP[id].type==='s') curSkin = id; else curTheme = id; sync(); }
    function usePromo() { 
        let v = document.getElementById('promo-in').value.toUpperCase();
        if(v === 'GIRI') coins += 1000;
        if(v === 'TEST') coins += 5000;
        document.getElementById('promo-in').value = ''; sync();
    }
    function setTab(t) {
        document.getElementById('sec-inv').style.display = t==='inv'?'block':'none';
        document.getElementById('sec-shop').style.display = t==='shop'?'block':'none';
    }
    function openModal() { document.getElementById('modal').style.display='block'; document.getElementById('overlay').style.display='block'; sync(); }
    function closeModal() { document.getElementById('modal').style.display='none'; document.getElementById('overlay').style.display='none'; }

    sync();
</script>
</body>
</html>
