<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: FORCE CONNECT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .ava-box { width: 50px; height: 50px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .elo-tag { position: absolute; bottom: -5px; background: #00e676; color: #000; font-size: 10px; padding: 1px 4px; border-radius: 4px; }
        #board-frame { width: 90vw; height: 90vw; max-width: 380px; max-height: 380px; margin: 15px auto; border: 3px solid #333; background: #000; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .t-classic .w { background: #eeeed2; } .t-classic .b { background: #769656; }
        .t-blood .w { background: #400; } .t-blood .b { background: #100; }
        .t-purple .w { background: #204; } .t-purple .b { background: #102; }
        .selected { outline: 3px solid var(--gold); z-index: 10; background: rgba(255,215,0,0.3) !important; }
        .btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #storage { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: #151515; border: 2px solid var(--gold); padding: 15px; z-index: 200; border-radius: 10px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        .item-row { background: #222; margin: 5px 0; padding: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; font-size: 13px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; width: 80%; border-radius: 5px; margin: 5px 0; }
    </style>
</head>
<body id="giri-app" class="t-classic">

<div id="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="ava-box" id="my-ava">👤<div class="elo-tag" id="elo-val">1200</div></div>
        <div style="text-align:left"><small>КОИНЫ</small><br><b id="coins-val" style="color:var(--gold)">0</b></div>
    </div>
    <button class="btn" onclick="openS()">ИНВЕНТАРЬ</button>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 10px;">
    <input type="text" id="target-id" placeholder="Вставь ID друга">
    <button class="btn" style="background:#00e676" onclick="connectToFriend()">ИГРАТЬ</button>
    <p>Твой ID: <b id="my-id" style="color:var(--gold)">...ГЕНЕРАЦИЯ...</b></p>
    <button class="btn" style="background:#444; color:#fff; font-size:10px;" onclick="location.reload()">СБРОСИТЬ ОШИБКУ</button>
</div>

<div id="overlay" onclick="closeS()"></div>
<div id="storage">
    <h3 style="margin-top:0">МАГАЗИН И СКЛАД</h3>
    <div id="inventory-list"></div>
    <hr style="border-color:#333">
    <input type="text" id="promo-input" placeholder="ПРОМОКОД">
    <button class="btn" style="width:100%" onclick="promo()">ОК</button>
    <button class="btn" style="width:100%; margin-top:10px; background:#666" onclick="closeS()">ЗАКРЫТЬ</button>
</div>

<script>
    const ITEMS = {
        't-classic': { n: 'Классика', p: 0, type: 't' },
        't-purple': { n: 'Неон', p: 500, type: 't' },
        't-blood': { n: 'Кровь', p: 1000, type: 't' },
        's-default': { n: 'Скин: Обычный', p: 0, type: 's' },
        's-giri': { n: 'Скин: ГИРИ', p: 800, type: 's' }
    };

    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['t-classic', 's-default'];
    let theme = localStorage.getItem('g_t') || 't-classic';
    let skin = localStorage.getItem('g_s') || 's-default';
    let ava = '👤';

    const game = new Chess();
    let conn, myColor = 'w', selectedSq = null;

    // ПЕРЕНАСТРОЙКА СЕТИ: Используем только надежные Google STUN серверы
    const peer = new Peer({
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]},
        debug: 1
    });

    peer.on('open', id => {
        // Делаем ID коротким визуально для пользователя
        document.getElementById('my-id').innerText = id.toString().slice(0,6).toUpperCase();
        // Но реально используем полный id для связи
        window.fullId = id;
    });

    peer.on('error', err => {
        console.log(err.type);
        if(err.type === 'server-error') {
            document.getElementById('my-id').innerText = "СЕРВЕР ЗАНЯТ... ЖДИ";
            setTimeout(() => location.reload(), 3000);
        } else {
            document.getElementById('my-id').innerText = "ОШИБКА: " + err.type;
        }
    });

    peer.on('connection', c => {
        conn = c; myColor = 'w';
        alert("Игрок зашел! Твой ход.");
        setupComm();
    });

    function connectToFriend() {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return;
        // Пробуем подключиться. Если это короткий ID, может не сработать, 
        // поэтому лучше копировать полный ID который выдает система.
        conn = peer.connect(id);
        myColor = 'b';
        conn.on('open', () => { alert("СВЯЗЬ ЕСТЬ!"); setupComm(); });
    }

    function setupComm() {
        conn.on('data', d => {
            if(d.type === 'move') { game.move(d.m); render(); }
        });
    }

    function render() {
        const b = document.getElementById('board');
        b.innerHTML = '';
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${selectedSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    if(skin==='s-giri') pc.innerText = {p:'🪨',r:'📦',n:'🏋️',b:'🔔',q:'🏆',k:'💪'}[p.type];
                    else pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor) return;
                    if(selectedSq===sq) selectedSq = null;
                    else if(selectedSq) {
                        const m = game.move({from: selectedSq, to: sq, promotion: 'q'});
                        if(m && conn) conn.send({type:'move', m: m});
                        selectedSq = null;
                    } else {
                        const pc = game.get(sq);
                        if(pc && pc.color===myColor) selectedSq = sq;
                    }
                    render();
                };
                b.appendChild(cell);
            });
        });
    }

    function refresh() {
        document.getElementById('coins-val').innerText = coins;
        document.getElementById('giri-app').className = theme;
        const list = document.getElementById('inventory-list');
        list.innerHTML = '';
        for(let id in ITEMS) {
            const it = ITEMS[id];
            const isU = unlocked.includes(id);
            list.innerHTML += `<div class="item-row">
                <span>${it.n}</span>
                <button class="btn" onclick="${isU?'use':'buy'}('${id}')">
                    ${isU ? (theme===id||skin===id?'ОК':'ВЗЯТЬ') : it.p+'🪙'}
                </button>
            </div>`;
        }
        localStorage.setItem('g_c', coins);
        localStorage.setItem('g_u', JSON.stringify(unlocked));
        localStorage.setItem('g_t', theme);
        localStorage.setItem('g_s', skin);
        render();
    }

    function buy(id) { if(coins >= ITEMS[id].p){ coins -= ITEMS[id].p; unlocked.push(id); refresh(); } }
    function use(id) { if(ITEMS[id].type==='t') theme = id; else skin = id; refresh(); }
    function promo() {
        if(document.getElementById('promo-input').value.toUpperCase()==='GIRI') { coins+=1000; alert("БОНУС!"); }
        refresh();
    }
    function openS() { document.getElementById('storage').style.display='block'; document.getElementById('overlay').style.display='block'; refresh(); }
    function closeS() { document.getElementById('storage').style.display='none'; document.getElementById('overlay').style.display='none'; }
    refresh();
</script>
</body>
</html>
