<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; --green: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow: hidden; -webkit-user-select: none; }
        
        /* Шапка */
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .p-info { display: flex; align-items: center; gap: 8px; text-align: left; }
        .ava-box { width: 45px; height: 45px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        /* Доска */
        #board-frame { width: 94vw; height: 94vw; max-width: 380px; max-height: 380px; margin: 15px auto; border: 3px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; }
        
        /* Темы оформления */
        .t-def .w { background: #eeeed2; } .t-def .b { background: #769656; }
        .t-purple .w { background: #2d004d; } .t-purple .b { background: #1a0029; }
        .t-blood .w { background: #4a0000; } .t-blood .b { background: #1a0000; }
        
        .selected { background: rgba(255, 215, 0, 0.6) !important; box-shadow: inset 0 0 10px #000; }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        
        /* Меню и Магазин */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: #151515; border: 2px solid var(--gold); padding: 20px; z-index: 200; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        
        input { background: #000; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .grid-item { background: #222; padding: 10px; border: 1px solid #444; border-radius: 8px; font-size: 20px; position: relative; }
        .grid-item.active { border-color: var(--gold); background: #332b00; }
        .price { font-size: 10px; display: block; color: var(--gold); }
        
        #turn-status { font-size: 12px; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body class="t-def" id="app">

<div id="top-bar">
    <div class="p-info">
        <div class="ava-box" id="disp-ava">👤</div>
        <div><b id="disp-coins">0</b> 🪙<br><small id="disp-elo">🏆 1200</small></div>
    </div>
    <div id="turn-status">GIRI CHESS</div>
    <button class="btn" onclick="openM()">МЕНЮ</button>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 0 10px;">
    <input type="text" id="room-id" placeholder="Код комнаты (напр. 777)">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button class="btn" style="flex:1" onclick="join(1)">СОЗДАТЬ</button>
        <button class="btn" style="flex:1" onclick="join(2)">ЗАЙТИ</button>
    </div>
    <div style="display:flex; gap:5px;">
        <button class="btn" style="flex:1; background:#4caf50" onclick="startBot(1)">БОТ: НУБ</button>
        <button class="btn" style="flex:1; background:#f44336" onclick="startBot(3)">БОТ: GIRI</button>
    </div>
</div>

<div id="overlay" onclick="closeM()"></div>
<div id="modal">
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button class="btn" style="flex:1" onclick="setTab('inv')">ИНВЕНТАРЬ</button>
        <button class="btn" style="flex:1" onclick="setTab('shop')">МАГАЗИН</button>
    </div>
    
    <div id="sec-inv">
        <p><small>АВАТАРКИ:</small></p>
        <div class="grid" id="inv-avas"></div>
        <p><small>ТЕМЫ И СКИНЫ:</small></p>
        <div id="inv-items"></div>
    </div>

    <div id="sec-shop" style="display:none">
        <p><small>КУПИТЬ АВАТАР:</small></p>
        <div class="grid" id="shop-avas"></div>
        <p><small>КУПИТЬ ОФОРМЛЕНИЕ:</small></p>
        <div id="shop-items"></div>
    </div>

    <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
    <input type="text" id="promo" placeholder="ПРОМОКОД">
    <button class="btn" style="width:100%" onclick="usePromo()">ОК</button>
</div>

<script>
    // Инициализация Firebase
    const fb = firebase.initializeApp({ databaseURL: "https://mychess-18329-default-rtdb.europe-west1.firebasedatabase.app" });
    const db = fb.database();

    const game = new Chess();
    let myColor = 'w', roomId = null, botLvl = 0, lastSq = null;

    // Данные магазина
    const AVATARS = { '👤':0, '🐱':100, '👺':300, '🥷':500, '🤡':1000 };
    const ITEMS = {
        't-purple': { n: 'Фиолетовый Неон', p: 500, type: 't' },
        't-blood': { n: 'Кровавая Луна', p: 800, type: 't' },
        's-giri': { n: 'Скин: ГИРИ 🪨', p: 1000, type: 's' }
    };

    // Загрузка сохранений
    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let elo = parseInt(localStorage.getItem('g_elo')) || 1200;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['👤', 't-def', 's-def'];
    let curAva = localStorage.getItem('g_a') || '👤';
    let curTheme = localStorage.getItem('g_t') || 't-def';
    let curSkin = localStorage.getItem('g_s') || 's-def';

    function join(mode) {
        const id = document.getElementById('room-id').value.trim();
        if(!id) return alert("Введите код!");
        roomId = id; botLvl = 0;
        myColor = (mode === 1) ? 'w' : 'b';
        game.reset();

        if(mode === 1) db.ref('games/'+roomId).set({ f: game.fen() });

        db.ref('games/'+roomId).on('value', s => {
            const data = s.val();
            if(data && data.f !== game.fen()) {
                game.load(data.f);
                render();
            }
        });
        alert(mode === 1 ? "Ждем хода друга!" : "Вы зашли за ЧЕРНЫХ!");
        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        document.getElementById('app').className = curTheme;
        
        const turn = game.turn() === 'w' ? "ХОД БЕЛЫХ" : "ХОД ЧЕРНЫХ";
        document.getElementById('turn-status').innerText = roomId ? `${turn} (${myColor==='w'?'ВЫ БЕЛЫЕ':'ВЫ ЧЕРНЫЕ'})` : turn;

        let rows = [0,1,2,3,4,5,6,7], cols = [0,1,2,3,4,5,6,7];
        if (myColor === 'b') { rows.reverse(); cols.reverse(); }

        const boardArr = game.board();
        rows.forEach(r => {
            cols.forEach(c => {
                const p = boardArr[r][c];
                const sq = String.fromCharCode(97+c)+(8-r);
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${lastSq===sq?'selected':''}`;

                if(p) {
                    const pc = document.createElement('div');
                    pc.style.color = p.color === 'w' ? '#fff' : '#000';
                    if(curSkin === 's-giri') {
                        pc.innerText = {p:'🪨',r:'📦',n:'🏋️',b:'🔔',q:'🏆',k:'💪'}[p.type];
                    } else {
                        pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    }
                    cell.appendChild(pc);
                }

                cell.onclick = () => {
                    if(game.game_over() || (roomId && game.turn() !== myColor)) return;
                    if(lastSq) {
                        const m = game.move({from: lastSq, to: sq, promotion: 'q'});
                        if(m) {
                            if(roomId) db.ref('games/'+roomId).update({ f: game.fen() });
                            lastSq = null;
                            if(botLvl > 0) setTimeout(botMove, 600);
                        } else {
                            const piece = game.get(sq);
                            if(piece && piece.color === game.turn()) lastSq = sq;
                            else lastSq = null;
                        }
                    } else {
                        const piece = game.get(sq);
                        if(piece && piece.color === game.turn()) lastSq = sq;
                    }
                    render();
                };
                boardEl.appendChild(cell);
            });
        });
    }

    function botMove() {
        const m = game.moves(); if(!m.length) return;
        game.move(botLvl===1 ? m[Math.floor(Math.random()*m.length)] : m.sort((a,b)=>b.includes('x')?1:-1)[0]);
        render();
    }

    function startBot(l) { botLvl=l; roomId=null; myColor='w'; game.reset(); render(); }

    function sync() {
        document.getElementById('disp-coins').innerText = coins;
        document.getElementById('disp-elo').innerText = "🏆 " + elo;
        document.getElementById('disp-ava').innerText = curAva;

        // Отрисовка инвентаря и магазина
        const invA = document.getElementById('inv-avas'), shopA = document.getElementById('shop-avas');
        const invI = document.getElementById('inv-items'), shopI = document.getElementById('shop-items');
        invA.innerHTML = ''; shopA.innerHTML = ''; invI.innerHTML = ''; shopI.innerHTML = '';

        for(let a in AVATARS) {
            if(unlocked.includes(a)) invA.innerHTML += `<div class="grid-item ${curAva===a?'active':''}" onclick="buyAva('${a}')">${a}</div>`;
            else shopA.innerHTML += `<div class="grid-item" onclick="buyAva('${a}')">${a}<span class="price">${AVATARS[a]}</span></div>`;
        }

        for(let id in ITEMS) {
            if(unlocked.includes(id)) invI.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;background:#222;margin-bottom:5px;border-radius:8px;">${ITEMS[id].n} <button class="btn" onclick="useItem('${id}')">ВЗЯТЬ</button></div>`;
            else shopI.innerHTML += `<div style="display:flex;justify-content:space-between;padding:10px;background:#222;margin-bottom:5px;border-radius:8px;">${ITEMS[id].n} <button class="btn" onclick="buyItem('${id}')">${ITEMS[id].p} 🪙</button></div>`;
        }

        localStorage.setItem('g_c', coins); localStorage.setItem('g_u', JSON.stringify(unlocked));
        localStorage.setItem('g_a', curAva); localStorage.setItem('g_t', curTheme); localStorage.setItem('g_s', curSkin);
        render();
    }

    function buyAva(a) {
        if(unlocked.includes(a)) curAva = a;
        else if(coins >= AVATARS[a]) { coins -= AVATARS[a]; unlocked.push(a); curAva = a; }
        sync();
    }
    function buyItem(id) { if(coins >= ITEMS[id].p) { coins -= ITEMS[id].p; unlocked.push(id); sync(); } }
    function useItem(id) { if(ITEMS[id].type === 's') curSkin = id; else curTheme = id; sync(); }
    function usePromo() { if(document.getElementById('promo').value.toUpperCase() === 'GIRI') coins += 1000; sync(); document.getElementById('promo').value=''; }
    
    function openM() { document.getElementById('modal').style.display='block'; document.getElementById('overlay').style.display='block'; sync(); }
    function closeM() { document.getElementById('modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
    function setTab(t) { document.getElementById('sec-inv').style.display = t==='inv'?'block':'none'; document.getElementById('sec-shop').style.display = t==='shop'?'block':'none'; }

    sync();
</script>
</body>
</html>
