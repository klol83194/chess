<script>
    const ITEMS = {
        't-classic': { n: 'Тема: Классика', p: 0, type: 't' },
        't-purple': { n: 'Тема: Неон', p: 500, type: 't' },
        't-blood': { n: 'Тема: Кровь', p: 1000, type: 't' },
        's-default': { n: 'Скин: Обычный', p: 0, type: 's' },
        's-giri': { n: 'Скин: ГИРИ 🪨', p: 800, type: 's' },
        's-war': { n: 'Скин: Техника 🚁', p: 1500, type: 's' }
    };
    const AVAS = { '👤': 0, '🐱': 150, '👺': 250, '🥷': 400, '🤡': 1000 };

    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let elo = parseInt(localStorage.getItem('g_e')) || 1200;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['t-classic', 's-default', '👤'];
    let theme = localStorage.getItem('g_t') || 't-classic';
    let skin = localStorage.getItem('g_s') || 's-default';
    let ava = localStorage.getItem('g_a') || '👤';

    const game = new Chess();
    let conn, myColor = 'w', selectedSq = null;

    // Упрощенная инициализация PeerJS
    const peer = new Peer();

    // Отслеживаем создание ID
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        console.log('Ваш ID готов:', id);
    });

    // Обработка ошибок (важно для отладки у друзей!)
    peer.on('error', err => {
        console.error('Ошибка PeerJS:', err.type);
        document.getElementById('my-id').innerText = "Ошибка: " + err.type;
        if(err.type === 'browser-incompatible') alert("Браузер не поддерживает технологию связи.");
    });

    // Когда К НАМ подключаются
    peer.on('connection', c => {
        conn = c; 
        myColor = 'w';
        alert("Противник подключился! Вы играете БЕЛЫМИ.");
        setupConn();
    });

    // Когда МЫ подключаемся
    function connect() {
        const id = document.getElementById('target-id').value.trim();
        if(!id) return;
        
        conn = peer.connect(id);
        myColor = 'b'; // Кто подключается — тот черными

        conn.on('open', () => {
            alert("Вы подключились! Вы играете ЧЕРНЫМИ.");
            setupConn();
        });
    }

    // Общая функция для прослушки данных
    function setupConn() {
        conn.on('data', d => {
            if(d.type === 'move') {
                game.move(d.m);
                render();
            }
        });
    }

    function refresh() {
        document.getElementById('coins-val').innerText = coins;
        document.getElementById('elo-val').innerText = elo;
        document.getElementById('my-ava').childNodes[0].textContent = ava;
        document.getElementById('giri-app').className = theme;

        const invAvas = document.getElementById('inv-avas'), shopAvas = document.getElementById('shop-avas');
        invAvas.innerHTML = ''; shopAvas.innerHTML = '';
        for(let a in AVAS) {
            if(unlocked.includes(a)) invAvas.innerHTML += `<div class="ava-item ${ava===a?'ava-active':''}" onclick="setA('${a}')">${a}</div>`;
            else shopAvas.innerHTML += `<div class="ava-item" onclick="buyA('${a}')">${a}<br><small>${AVAS[a]}</small></div>`;
        }

        const invL = document.getElementById('inventory-list'), shopL = document.getElementById('shop-list');
        invL.innerHTML = ''; shopL.innerHTML = '';
        for(let id in ITEMS) {
            const it = ITEMS[id];
            if(unlocked.includes(id)) {
                const active = (theme===id || skin===id);
                invL.innerHTML += `<div class="item-row ${active?'row-on':''}"><span>${it.n}</span><button class="btn" onclick="use('${id}')">${active?'ОК':'ВЗЯТЬ'}</button></div>`;
            } else {
                shopL.innerHTML += `<div class="item-row"><span>${it.n}</span><button class="btn" onclick="buyT('${id}')">${it.p} 🪙</button></div>`;
            }
        }
        localStorage.setItem('g_c', coins); localStorage.setItem('g_u', JSON.stringify(unlocked));
        localStorage.setItem('g_t', theme); localStorage.setItem('g_s', skin); localStorage.setItem('g_a', ava);
        render();
    }

    function promo() {
        const v = document.getElementById('promo-input').value.toUpperCase();
        if(v === 'GIRI2026') { coins += 5000; alert("+5000!"); }
        if(v === 'FREE') { coins += 500; alert("+500!"); }
        document.getElementById('promo-input').value = ''; refresh();
    }

    function buyA(a) { if(coins >= AVAS[a]){ coins -= AVAS[a]; unlocked.push(a); refresh(); } }
    function buyT(id) { if(coins >= ITEMS[id].p){ coins -= ITEMS[id].p; unlocked.push(id); refresh(); } }
    function use(id) { if(ITEMS[id].type==='t') theme = id; else skin = id; refresh(); }
    function setA(a) { ava = a; refresh(); }
    
    function setTab(t) {
        document.getElementById('sec-inv').style.display = t==='inv'?'block':'none';
        document.getElementById('sec-shop').style.display = t==='shop'?'block':'none';
        document.getElementById('t-inv').className = 'tab-btn '+(t==='inv'?'tab-active':'');
        document.getElementById('t-shop').className = 'tab-btn '+(t==='shop'?'tab-active':'');
    }

    function render() {
        const b = document.getElementById('board'); b.innerHTML = '';
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${selectedSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    pc.className = 'piece';
                    if(skin==='s-giri') pc.innerText = {p:'🪨', r:'📦', n:'🏋️', b:'🔔', q:'🏆', k:'💪'}[p.type];
                    else if(skin==='s-war') pc.innerText = {p:'🚜', r:'🚀', n:'🚁', b:'🛡️', q:'🎖️', k:'🛰️'}[p.type];
                    else pc.innerText = {p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚', P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor) return;
                    if(selectedSq===sq) selectedSq = null;
                    else if(selectedSq) {
                        const m = game.move({from: selectedSq, to: sq, promotion: 'q'});
                        if(m) {
                            if(conn) conn.send({type:'move', m:m});
                            selectedSq = null;
                        } else {
                           selectedSq = null; // Неверный ход
                        }
                    } else {
                        const pc = game.get(sq); if(pc && pc.color===myColor) selectedSq = sq;
                    }
                    render();
                };
                b.appendChild(cell);
            });
        });
    }

    function openS() { document.getElementById('storage').style.display='block'; document.getElementById('overlay').style.display='block'; refresh(); }
    function closeS() { document.getElementById('storage').style.display='none'; document.getElementById('overlay').style.display='none'; }
    refresh();
</script>
