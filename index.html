<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: NO-BLOCK EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .ava-box { width: 50px; height: 50px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        #board-frame { width: 90vw; height: 90vw; max-width: 380px; max-height: 380px; margin: 15px auto; border: 3px solid #333; background: #000; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .w { background: #eeeed2; } .b { background: #769656; }
        .selected { outline: 3px solid var(--gold); background: rgba(255,215,0,0.3) !important; }
        .btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; width: 80%; border-radius: 5px; margin: 5px 0; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="ava-box">👤</div>
        <div style="text-align:left"><small>КОИНЫ</small><br><b id="coins-val" style="color:var(--gold)">0</b></div>
    </div>
    <div id="status" style="font-size: 10px; color: #888;">СЕТЬ: ПОИСК...</div>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 10px;">
    <input type="text" id="target-id" placeholder="ID друга">
    <button class="btn" style="background:#00e676" onclick="connectToFriend()">ИГРАТЬ</button>
    <p>Твой ID: <b id="my-id" style="color:var(--gold)">ГЕНЕРАЦИЯ...</b></p>
    <p style="font-size: 10px; color: #555;">Если грузит долго — смени Wi-Fi на 4G</p>
</div>

<script>
    const game = new Chess();
    let conn, myColor = 'w', selectedSq = null;
    let coins = parseInt(localStorage.getItem('g_c')) || 100;

    // ХАК: Пытаемся подключиться к альтернативным портам
    const peer = new Peer(undefined, {
        host: 'peerjs.com', // Используем основной домен вместо 0.peerjs.com
        port: 443,
        secure: true,
        debug: 3,
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ]
        }
    });

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id.toString().slice(0,5).toUpperCase();
        document.getElementById('status').innerText = "СЕТЬ: ОК";
        window.realId = id;
    });

    peer.on('error', err => {
        document.getElementById('status').innerText = "ОШИБКА: " + err.type;
        if(err.type === 'server-error' || err.type === 'network') {
            document.getElementById('my-id').innerText = "БЛОКИРОВКА СЕТИ";
        }
    });

    peer.on('connection', c => {
        conn = c; myColor = 'w';
        alert("Противник подключен! Твой ход.");
        setup();
    });

    function connectToFriend() {
        const id = document.getElementById('target-id').value.trim();
        conn = peer.connect(id);
        myColor = 'b';
        conn.on('open', () => { alert("Связь установлена!"); setup(); });
    }

    function setup() {
        conn.on('data', d => { if(d.type==='move'){ game.move(d.m); render(); } });
    }

    function render() {
        const b = document.getElementById('board');
        b.innerHTML = '';
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${selectedSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor) return;
                    if(selectedSq===sq) selectedSq = null;
                    else if(selectedSq) {
                        const m = game.move({from: selectedSq, to: sq, promotion: 'q'});
                        if(m && conn) conn.send({type:'move', m: m});
                        selectedSq = null;
                    } else {
                        const pc = game.get(sq);
                        if(pc && pc.color===myColor) selectedSq = sq;
                    }
                    render();
                };
                b.appendChild(cell);
            });
        });
    }

    document.getElementById('coins-val').innerText = coins;
    render();
</script>
</body>
</html>
