<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .ava-box { width: 45px; height: 45px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #board-frame { width: 90vw; height: 90vw; max-width: 360px; max-height: 360px; margin: 10px auto; border: 2px solid #333; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .w { background: #eeeed2; } .b { background: #769656; }
        .btn { background: var(--gold); color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 2px; }
        #storage { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; background: #151515; border: 2px solid var(--gold); padding: 15px; z-index: 200; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        .item-row { background: #222; margin: 5px 0; padding: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-radius: 5px; }
        .tab-btn { background: #333; color: #fff; border: none; padding: 10px; width: 48%; }
        .active { background: var(--gold); color: #000; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 80%; margin: 5px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="display:flex; align-items:center; gap:8px;">
        <div class="ava-box" id="cur-ava">👤</div>
        <b id="coins-val" style="color:var(--gold)">0</b>
    </div>
    <button class="btn" onclick="openM()">МАГАЗИН</button>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 10px;">
    <input type="text" id="peer-id-input" placeholder="ID противника">
    <button class="btn" onclick="connect()">ИГРАТЬ</button>
    <div>Твой ID: <b id="my-id" style="color:var(--gold)">...</b></div>
    <small id="debug" style="font-size: 9px; color: #555;"></small>
</div>

<div id="overlay" onclick="closeM()"></div>
<div id="storage">
    <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
        <button id="b-inv" class="tab-btn active" onclick="tab('inv')">СКЛАД</button>
        <button id="b-shop" class="tab-btn" onclick="tab('shop')">МАГАЗИН</button>
    </div>
    <div id="inv-sec"></div>
    <div id="shop-sec" style="display:none"></div>
    <hr style="border:0; border-top:1px solid #333;">
    <input type="text" id="promo-in" placeholder="ПРОМОКОД">
    <button class="btn" style="width:100%" onclick="promo()">OK</button>
</div>

<script>
    const ITEMS = {
        's-giri':{n:'Скин: ГИРИ', p:800, type:'s'},
        't-purple':{n:'Тема: НЕОН', p:500, type:'t'}
    };
    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['s-def','t-def'];
    let skin = localStorage.getItem('g_s') || 's-def';
    let theme = localStorage.getItem('g_t') || 't-def';

    const game = new Chess();
    let conn, myColor = 'w';

    // СЕТЬ - Ультра-базовый конфиг (самый надежный)
    const peer = new Peer(); 

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id.slice(0,5).toUpperCase();
        document.getElementById('debug').innerText = "Connected to Server";
    });

    peer.on('connection', c => {
        conn = c; myColor = 'w';
        alert("Бой начался!");
        c.on('data', d => { if(d.m) { game.move(d.m); render(); } });
    });

    function connect() {
        const id = document.getElementById('peer-id-input').value.toLowerCase();
        // ВАЖНО: PeerJS требует полный ID. Но мы для красоты обрезаем. 
        // Если не коннектит, нужно вводить полный ID (он длиннее 5 символов).
        alert("Попытка связи...");
        conn = peer.connect(id);
        myColor = 'b';
        conn.on('open', () => { alert("Связь есть!"); });
        conn.on('data', d => { if(d.m) { game.move(d.m); render(); } });
    }

    function render() {
        const b = document.getElementById('board'); b.innerHTML = '';
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'}`;
                if(p) {
                    const pc = document.createElement('div');
                    if(skin==='s-giri') pc.innerText = {p:'🪨',r:'📦',n:'🏋️',b:'🔔',q:'🏆',k:'💪'}[p.type];
                    else pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor) return;
                    let move = game.move({from: window.lastSq, to: sq, promotion: 'q'});
                    if(move) { if(conn) conn.send({m: move.san}); render(); window.lastSq = null; }
                    else { window.lastSq = sq; }
                };
                b.appendChild(cell);
            });
        });
    }

    function refresh() {
        document.getElementById('coins-val').innerText = coins;
        const inv = document.getElementById('inv-sec'), shp = document.getElementById('shop-sec');
        inv.innerHTML = ''; shp.innerHTML = '';
        for(let id in ITEMS) {
            if(unlocked.includes(id)) inv.innerHTML += `<div class="item-row">${ITEMS[id].n} <button class="btn" onclick="use('${id}')">ОК</button></div>`;
            else shp.innerHTML += `<div class="item-row">${ITEMS[id].n} <button class="btn" onclick="buy('${id}')">${ITEMS[id].p}🪙</button></div>`;
        }
        localStorage.setItem('g_c', coins);
        localStorage.setItem('g_u', JSON.stringify(unlocked));
    }

    function buy(id) { if(coins >= ITEMS[id].p) { coins -= ITEMS[id].p; unlocked.push(id); refresh(); } }
    function use(id) { if(ITEMS[id].type==='s') skin = id; else theme = id; refresh(); }
    function promo() { 
        let v = document.getElementById('promo-in').value.toUpperCase();
        if(v==='GIRI') coins += 1000;
        refresh(); 
    }
    
    function tab(t) {
        document.getElementById('inv-sec').style.display = t==='inv'?'block':'none';
        document.getElementById('shop-sec').style.display = t==='shop'?'block':'none';
        document.getElementById('b-inv').className = 'tab-btn '+(t==='inv'?'active':'');
        document.getElementById('b-shop').className = 'tab-btn '+(t==='shop'?'active':'');
    }

    function openM() { document.getElementById('storage').style.display='block'; document.getElementById('overlay').style.display='block'; refresh(); }
    function closeM() { document.getElementById('storage').style.display='none'; document.getElementById('overlay').style.display='none'; }

    refresh(); render();
</script>
</body>
</html>
