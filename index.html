<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow-x: hidden; -webkit-user-select: none; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 3px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .p-info { display: flex; align-items: center; gap: 8px; text-align: left; }
        .ava-box { width: 42px; height: 42px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .captured { height: 25px; display: flex; justify-content: center; gap: 2px; font-size: 18px; color: rgba(255,255,255,0.5); margin: 2px 0; }
        #board-frame { width: 92vw; max-width: 360px; aspect-ratio: 1/1; margin: 5px auto; border: 4px solid #333; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; }
        .t-def .w { background: #f0d9b5; } .t-def .b { background: #b58863; }
        .t-purple .w { background: #4d008c; } .t-purple .b { background: #1a0029; }
        .t-blood .w { background: #8a0000; } .t-blood .b { background: #300000; }
        .t-emerald .w { background: #adbb9a; } .t-emerald .b { background: #4e7837; }
        .t-cyber .w { background: #00ecff; } .t-cyber .b { background: #00374a; }
        .selected { background: rgba(255, 215, 0, 0.7) !important; }
        .btn { background: var(--gold); color: #000; border: none; padding: 8px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        #chat-box { width: 90vw; max-width: 360px; margin: 5px auto; height: 60px; background: #111; border: 1px solid #333; overflow-y: auto; text-align: left; padding: 5px; font-size: 12px; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 380px; background: #151515; border: 2px solid var(--gold); padding: 15px; z-index: 200; border-radius: 12px; max-height: 85vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 100%; box-sizing: border-box; margin-bottom: 5px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 10px; }
        .grid-item { background: #222; padding: 5px; border: 1px solid #444; border-radius: 5px; font-size: 18px; }
        .grid-item.active { border-color: var(--gold); background: #332b00; }
        .shop-item { display:flex; justify-content:space-between; align-items:center; background:#222; padding:8px; margin-bottom:5px; border-radius:8px; font-size:13px; }
    </style>
</head>
<body class="t-def" id="app">

<div id="top-bar">
    <div class="p-info">
        <div class="ava-box" id="disp-ava">👤</div>
        <div><b id="disp-coins">0</b> 🪙<br><small id="disp-elo">🏆 1200</small></div>
    </div>
    <div id="turn-status">GIRI CHESS</div>
    <button class="btn" onclick="openM()">МЕНЮ</button>
</div>

<div id="cap-top" class="captured"></div>
<div id="board-frame"><div id="board"></div></div>
<div id="cap-bot" class="captured"></div>
<div id="chat-box"></div>

<div style="padding: 5px 10px;">
    <div id="online-controls">
        <input type="text" id="room-id" placeholder="Код комнаты">
        <div style="display:flex; gap:5px;">
            <button class="btn" style="flex:1" onclick="join(1)">СОЗДАТЬ</button>
            <button class="btn" style="flex:1" onclick="join(2)">ЗАЙТИ</button>
        </div>
    </div>
    <div id="game-controls" style="display:none; display:flex; gap:5px;">
        <input type="text" id="msg-input" placeholder="Чат..." onkeypress="if(event.key==='Enter') sendMsg()" style="flex:3">
        <button class="btn" style="background:#f44336; flex:1" onclick="resign()">🏳️</button>
    </div>
</div>

<div id="overlay" onclick="closeM()"></div>
<div id="modal">
    <h4 style="margin:0 0 10px 0; color:var(--gold)">АВАТАРКИ</h4>
    <div class="grid" id="menu-avas"></div>
    <h4 style="margin:10px 0; color:var(--gold)">МАГАЗИН И ТЕМЫ</h4>
    <div id="menu-items"></div>
    <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
        <input type="text" id="promo-input" placeholder="ПРОМОКОД">
        <button class="btn" style="width:100%" onclick="usePromo()">АКТИВИРОВАТЬ</button>
    </div>
    <button class="btn" style="width:100%; margin-top:10px; background:#444; color:#fff" onclick="closeM()">ЗАКРЫТЬ</button>
</div>

<script>
    const fb = firebase.initializeApp({ databaseURL: "https://mychess-18329-default-rtdb.europe-west1.firebasedatabase.app" });
    const db = fb.database();
    const game = new Chess();
    let myColor = 'w', roomId = null, lastSq = null, gameEnded = false;

    const AVATARS = { '👤':0, '🐱':100, '👺':300, '🥷':500, '🤡':1000 };
    const ITEMS = {
        't-def': { n: 'Классика', p: 0, type: 't' },
        't-purple': { n: 'Фиолет', p: 400, type: 't' },
        't-blood': { n: 'Кровь', p: 400, type: 't' },
        't-emerald': { n: 'Изумруд', p: 400, type: 't' },
        't-cyber': { n: 'Кибер', p: 400, type: 't' },
        's-giri': { n: 'Скин: ГИРИ 🪨', p: 1000, type: 's' }
    };

    let coins = parseInt(localStorage.getItem('g_c')) || 100;
    let elo = parseInt(localStorage.getItem('g_elo')) || 1200;
    let unlocked = JSON.parse(localStorage.getItem('g_u')) || ['👤', 't-def'];
    let curAva = localStorage.getItem('g_a') || '👤';
    let curTheme = localStorage.getItem('g_t') || 't-def';
    let curSkin = localStorage.getItem('g_s') || 's-def';

    function join(mode) {
        const id = document.getElementById('room-id').value.trim();
        if(!id) return;
        roomId = id; myColor = (mode === 1) ? 'w' : 'b';
        game.reset(); gameEnded = false;
        document.getElementById('online-controls').style.display = 'none';
        document.getElementById('game-controls').style.display = 'flex';

        if(mode === 1) db.ref('games/'+roomId).set({ f: game.fen(), turn: 'w' });
        
        db.ref('games/'+roomId).on('value', s => {
            const data = s.val();
            if(!data) return;
            if(data.f.startsWith('win_')) {
                const winner = data.f.split('_')[1];
                endGame(winner === myColor);
                return;
            }
            if(data.f !== game.fen()) {
                game.load(data.f);
                if(game.game_over()) checkGameOver();
                render();
            }
        });

        db.ref('chats/'+roomId).on('child_added', s => {
            const m = s.val();
            document.getElementById('chat-box').innerHTML += `<div><b>${m.a}:</b> ${m.t}</div>`;
            document.getElementById('chat-box').scrollTop = 999;
        });
        render();
    }

    function checkGameOver() {
        if(gameEnded) return;
        if(game.in_checkmate()) {
            const winner = game.turn() === 'w' ? 'b' : 'w';
            db.ref('games/'+roomId).update({ f: 'win_' + winner });
        } else if(game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
            alert("Ничья!");
            location.reload();
        }
    }

    function endGame(isWin) {
        if(gameEnded) return;
        gameEnded = true;
        if(isWin) { elo += 25; coins += 50; alert("ПОБЕДА! +25 Эло, +50 монет"); }
        else { elo -= 25; alert("ПОРАЖЕНИЕ! -25 Эло"); }
        save();
        setTimeout(() => location.reload(), 2000);
    }

    function resign() { 
        if(confirm("Сдаться?")) {
            const winner = myColor === 'w' ? 'b' : 'w';
            db.ref('games/'+roomId).update({ f: 'win_' + winner });
        }
    }

    function sendMsg() {
        const i = document.getElementById('msg-input');
        if(!i.value || !roomId) return;
        db.ref('chats/'+roomId).push({ a: curAva, t: i.value });
        i.value = '';
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        document.getElementById('app').className = curTheme;
        updateCaptured();
        let rows = [0,1,2,3,4,5,6,7], cols = [0,1,2,3,4,5,6,7];
        if (myColor === 'b') { rows.reverse(); cols.reverse(); }
        const boardArr = game.board();
        rows.forEach(r => {
            cols.forEach(c => {
                const p = boardArr[r][c];
                const sq = String.fromCharCode(97+c)+(8-r);
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${lastSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    pc.style.color = p.color === 'w' ? '#fff' : '#111';
                    if(p.color === 'w') pc.style.textShadow = "0 0 2px #000";
                    pc.innerText = (curSkin === 's-giri') ? {p:'🪨',r:'📦',n:'🏋️',b:'🔔',q:'🏆',k:'💪'}[p.type] : {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚'}[p.type];
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.game_over() || (roomId && game.turn() !== myColor)) return;
                    if(lastSq) {
                        if(game.move({from: lastSq, to: sq, promotion: 'q'})) {
                            db.ref('games/'+roomId).update({ f: game.fen() });
                            lastSq = null;
                            if(game.game_over()) checkGameOver();
                        } else {
                            const piece = game.get(sq);
                            if(piece && piece.color === game.turn()) lastSq = sq;
                        }
                    } else {
                        const piece = game.get(sq);
                        if(piece && piece.color === game.turn()) lastSq = sq;
                    }
                    render();
                };
                boardEl.appendChild(cell);
            });
        });
    }

    function updateCaptured() {
        const history = game.history({verbose: true});
        const capW = [], capB = [];
        history.forEach(m => {
            if(m.captured) {
                const char = {p:'♟', r:'♜', n:'♞', b:'♝', q:'♛'}[m.captured];
                if(m.color === 'w') capB.push(char); else capW.push(char);
            }
        });
        document.getElementById('cap-top').innerText = myColor === 'w' ? capB.join('') : capW.join('');
        document.getElementById('cap-bot').innerText = myColor === 'w' ? capW.join('') : capB.join('');
    }

    function openM() {
        const avaG = document.getElementById('menu-avas'), itemG = document.getElementById('menu-items');
        avaG.innerHTML = ''; itemG.innerHTML = '';
        for(let a in AVATARS) {
            const isU = unlocked.includes(a);
            avaG.innerHTML += `<div class="grid-item ${curAva===a?'active':''}" onclick="buyA('${a}')">${a}${isU?'':'<br><small style="font-size:8px">'+AVATARS[a]+'</small>'}</div>`;
        }
        for(let id in ITEMS) {
            const isU = unlocked.includes(id);
            itemG.innerHTML += `<div class="shop-item"><span>${ITEMS[id].n}</span> <button class="btn" onclick="buyI('${id}')">${isU?'ВЗЯТЬ':ITEMS[id].p+'🪙'}</button></div>`;
        }
        document.getElementById('modal').style.display='block';
        document.getElementById('overlay').style.display='block';
    }

    function buyA(a) {
        if(unlocked.includes(a)) curAva = a;
        else if(coins >= AVATARS[a]) { coins -= AVATARS[a]; unlocked.push(a); curAva = a; }
        save(); openM();
    }
    function buyI(id) {
        if(unlocked.includes(id)) { if(ITEMS[id].type==='s') curSkin=id; else curTheme=id; }
        else if(coins >= ITEMS[id].p) { coins -= ITEMS[id].p; unlocked.push(id); }
        save(); openM();
    }
    function usePromo() {
        const p = document.getElementById('promo-input').value.toUpperCase();
        if(p === 'GIRI') { coins += 1000; alert("+1000 монет!"); }
        document.getElementById('promo-input').value = ''; save(); openM();
    }
    function closeM() { document.getElementById('modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
    
    function save() {
        localStorage.setItem('g_c', coins); localStorage.setItem('g_u', JSON.stringify(unlocked));
        localStorage.setItem('g_a', curAva); localStorage.setItem('g_t', curTheme); 
        localStorage.setItem('g_s', curSkin); localStorage.setItem('g_elo', elo);
        document.getElementById('disp-coins').innerText = coins; 
        document.getElementById('disp-ava').innerText = curAva;
        document.getElementById('disp-elo').innerText = "🏆 " + elo;
        render();
    }
    save();
</script>
</body>
</html>
