<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIRI CHESS: PROMO & FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        #top-bar { background: #1a1a1a; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; align-items: center; }
        .ava-box { width: 45px; height: 45px; border-radius: 50%; background: #222; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #board-frame { width: 90vw; height: 90vw; max-width: 380px; max-height: 380px; margin: 15px auto; border: 3px solid #333; background: #000; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .cell { display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .w { background: #eeeed2; } .b { background: #769656; }
        .selected { outline: 3px solid var(--gold); background: rgba(255,215,0,0.3) !important; }
        .btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; margin: 5px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 10px; width: 70%; border-radius: 5px; margin: 5px 0; }
        #menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: #151515; border: 2px solid var(--gold); padding: 20px; z-index: 200; border-radius: 10px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="ava-box">👤</div>
        <div style="text-align:left"><small>КОИНЫ</small><br><b id="coins-val" style="color:var(--gold)">0</b></div>
    </div>
    <button class="btn" onclick="openM()">МЕНЮ</button>
</div>

<div id="board-frame"><div id="board"></div></div>

<div style="padding: 10px;">
    <input type="text" id="target-id" placeholder="ID друга">
    <button class="btn" style="background:#00e676" onclick="connectToFriend()">ИГРАТЬ</button>
    <p>Твой ID: <b id="my-id" style="color:var(--gold)">ГЕНЕРАЦИЯ...</b></p>
</div>

<div id="overlay" onclick="closeM()"></div>
<div id="menu">
    <h3 style="margin:0 0 15px 0">МАГАЗИН / ПРОМО</h3>
    <input type="text" id="promo-input" placeholder="ВВЕДИ ПРОМОКОД">
    <button class="btn" style="width:100%" onclick="applyPromo()">АКТИВИРОВАТЬ</button>
    <hr style="border:0; border-top:1px solid #333; margin:15px 0">
    <div style="font-size: 12px; color: #aaa;">Скины и темы применяются автоматически при покупке.</div>
    <button class="btn" style="width:100%; background:#666; margin-top:10px" onclick="closeM()">ЗАКРЫТЬ</button>
</div>

<script>
    const game = new Chess();
    let conn, myColor = 'w', selectedSq = null;
    let coins = parseInt(localStorage.getItem('g_c')) || 100;

    // СЕТЕВОЙ БЛОК (ЗАЩИЩЕННЫЙ)
    const peer = new Peer(undefined, {
        host: 'peerjs.com', 
        port: 443, 
        secure: true,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id.toString().slice(0,5).toUpperCase();
        window.fullPeerId = id;
    });

    peer.on('error', () => { document.getElementById('my-id').innerText = "ОШИБКА СЕТИ"; });

    peer.on('connection', c => {
        conn = c; myColor = 'w';
        alert("Противник вошел!");
        setup();
    });

    function connectToFriend() {
        const id = document.getElementById('target-id').value.trim();
        conn = peer.connect(id);
        myColor = 'b';
        conn.on('open', () => { alert("Связь есть!"); setup(); });
    }

    function setup() {
        conn.on('data', d => { if(d.type==='move'){ game.move(d.m); render(); } });
    }

    // ПРОМОКОДЫ
    function applyPromo() {
        const code = document.getElementById('promo-input').value.toUpperCase();
        if(code === 'GIRI') {
            coins += 1000;
            alert("Успех! +1000 коинов!");
        } else if(code === 'TEST') {
            coins += 5000;
            alert("Админ-бонус: +5000!");
        } else {
            alert("Неверный код!");
        }
        document.getElementById('promo-input').value = '';
        save();
    }

    function save() {
        localStorage.setItem('g_c', coins);
        document.getElementById('coins-val').innerText = coins;
    }

    function render() {
        const b = document.getElementById('board');
        b.innerHTML = '';
        game.board().forEach((row, r) => {
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                const sq = String.fromCharCode(97+c)+(8-r);
                cell.className = `cell ${(r+c)%2===0?'w':'b'} ${selectedSq===sq?'selected':''}`;
                if(p) {
                    const pc = document.createElement('div');
                    pc.innerText = {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',P:'♙',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔'}[p.color==='w'?p.type.toUpperCase():p.type];
                    pc.style.color = p.color==='w'?'#fff':'#000';
                    cell.appendChild(pc);
                }
                cell.onclick = () => {
                    if(game.turn() !== myColor) return;
                    if(selectedSq===sq) selectedSq = null;
                    else if(selectedSq) {
                        const m = game.move({from: selectedSq, to: sq, promotion: 'q'});
                        if(m && conn) conn.send({type:'move', m: m});
                        selectedSq = null;
                    } else {
                        const pc = game.get(sq);
                        if(pc && pc.color===myColor) selectedSq = sq;
                    }
                    render();
                };
                b.appendChild(cell);
            });
        });
    }

    function openM() { document.getElementById('menu').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeM() { document.getElementById('menu').style.display='none'; document.getElementById('overlay').style.display='none'; }

    save();
    render();
</script>
</body>
</html>
